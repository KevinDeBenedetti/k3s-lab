# =============================================================================
# CI / CD — k3s-lab lint, tests, security & docs dispatch
#
# Runs on every push and PR to main.
# Does NOT require a real cluster — all checks are static/offline.
#
# Jobs (reusable workflows from KevinDeBenedetti/github-workflows):
#   shell-ci    — shellcheck + actionlint + bats (via ci-shell.yml)
#   kubernetes  — kubeconform + .env.example check (via ci-kubernetes.yml)
#   security    — Gitleaks secret scanning (via security.yml)
#   docs        — trigger kevindebenedetti.github.io rebuild (push to main only)
# =============================================================================
name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ─── Shell linting ─────────────────────────────────────────────────────────
  # shellcheck  → all .sh files at warning severity
  # actionlint  → .github/workflows/
  # docs-link-check → relative links in docs/ don't escape docs/
  shell-ci:
    uses: KevinDeBenedetti/github-workflows/.github/workflows/ci-shell.yml@main
    with:
      run-shellcheck: true
      shellcheck-severity: warning
      run-actionlint: true
      actionlint-paths: .github/workflows/
      run-bats: false
      run-docker: false
      run-docs-link-check: true

  # ─── Kubernetes validation + .env.example check ──────────────────────────
  kubernetes:
    uses: KevinDeBenedetti/github-workflows/.github/workflows/ci-kubernetes.yml@main
    with:
      run-kubeconform: true
      kubeconform-paths: kubernetes/
      kubeconform-exclude: '.*-values\.yaml'
      kubeconform-include-crds-catalog: true
      run-env-example: true
      env-example-required-keys: >-
        SERVER_IP AGENT_IP DOMAIN EMAIL
        DASHBOARD_DOMAIN DASHBOARD_PASSWORD
        GRAFANA_DOMAIN GRAFANA_PASSWORD
        KUBECONFIG_CONTEXT K3S_VERSION K3S_NODE_TOKEN

  # ─── Secret scanning ──────────────────────────────────────────────────────
  security:
    uses: KevinDeBenedetti/github-workflows/.github/workflows/security.yml@main
    permissions:
      security-events: write
      actions: read
      contents: read
      pull-requests: read
    with:
      run-node-audit: false
      run-python-audit: false
      run-secret-scan: true
      run-codeql: false

  # ─── Docs dispatch (push to main only) ───────────────────────────────────
  # Triggers a rebuild of kevindebenedetti.github.io after all CI jobs pass.
  # Requires PAT_TOKEN secret (fine-grained PAT with contents:write on the hub repo).
  docs:
    needs: [shell-ci, kubernetes, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/cd-docs.yml@main
    secrets:
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
