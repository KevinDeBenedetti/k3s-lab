title = "k3s-lab gitleaks config"

[extend]
useDefault = true

# ---------------------------------------------------------------------------
# Global allowlist — historical commits with placeholder values only
# ---------------------------------------------------------------------------
# Commit a52f88897: docs/stack/vault.md used `VAULT_TOKEN=<root-token>` as a
# documentation placeholder. The current file uses a proper variable reference.
# The commit is in imported history (renamed from k3s-homelab) and cannot be
# amended without a force-push. This suppresses the false-positive fingerprint.
[allowlist]
description = "Historical doc commits with placeholder token values"
commits = ["a52f88897648fcc7b30df716c1bb9c44931d6c37"]

# ---------------------------------------------------------------------------
# Rule-specific allowlists
# ---------------------------------------------------------------------------
# Extend the built-in curl-auth-user rule to ignore lines where the
# "password" field is a Makefile loop variable ($$TRY), not a real secret.
[[rules]]
id = "curl-auth-user"

    [[rules.allowlists]]
    description = "Makefile loop variable — not a real credential"
    regexTarget = "line"
    regexes = ['''\$\$TRY''']
