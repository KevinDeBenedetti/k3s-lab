# Lima VM — k3s Server Node (Debian 12 Bookworm)
# Tests k3s/install-server.sh locally. Runs a real single-node k3s cluster
# accessible from the host via port-forwarded API server (localhost:6443).
#
# Usage (via Makefile):
#   make vm-k3s-create      → create VM (Debian 12, 2 CPU, 4 GB)
#   make vm-k3s-install     → run install-server.sh inside VM
#   make vm-k3s-kubeconfig  → merge kubeconfig → context: k3s-lima
#   make vm-k3s-test        → verify node Ready + pods running
#   make vm-k3s-shell       → open interactive shell
#   make vm-k3s-clean       → delete VM
#   make vm-k3s-full        → create → install → kubeconfig → test
#
# After make vm-k3s-full:
#   kubectl --context k3s-lima get nodes
#   kubectl --context k3s-lima get pods -A
#
# Note: 4 GB RAM is required — k3s baseline uses ~1.5 GB.
# Hint: if stuck on first boot, run: softwareupdate --install-rosetta

images:
  - location: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-arm64.qcow2"
    arch: "aarch64"
  - location: "https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-amd64.qcow2"
    arch: "x86_64"

cpus: 2
memory: "4GiB"
disk: "20GiB"

# Apple Virtualization framework — cgroupsv2 works out of the box
vmType: "vz"
vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true

mounts:
  # Host home mounted read-only at the same path — k3s/install-server.sh is
  # accessible inside the VM at /Users/<you>/dev/k3s-lab/k3s/install-server.sh
  - location: "~"
    writable: false
  - location: "/tmp/lima"
    writable: true

# Forward k3s API server → localhost:6443 on the host.
# The kubeconfig written by k3s uses server: https://127.0.0.1:6443
# which maps directly to this forwarder.
# Forward k3s API server → localhost:6443 on the host.
# Suppress systemd-resolved mDNS/LLMNR ports — macOS already owns 127.0.0.1:5353/5355.
# Rules require guestIP:"0.0.0.0" + proto:any because systemd-resolved binds on all
# interfaces (0.0.0.0); Lima's default guestIP (127.0.0.1) does not match those bindings.
portForwards:
  # k3s API server — used by host kubectl
  - guestPort: 6443
    hostPort: 6443
    hostIP: "127.0.0.1"
  # Traefik HTTP/HTTPS — fixed NodePorts so kube-proxy binds on all interfaces.
  # servicelb is disabled in k3s; NodePort is the only way to reach Traefik from
  # outside the cluster without a cloud LB. 30080/30443 are set via TRAEFIK_EXTRA_ARGS.
  - guestPort: 30080
    hostPort: 8080
    hostIP: "127.0.0.1"
  - guestPort: 30443
    hostPort: 8443
    hostIP: "127.0.0.1"
  # Suppress systemd-resolved mDNS/LLMNR — macOS already owns these ports
  - guestIP: "0.0.0.0"
    guestPort: 5353
    proto: any
    ignore: true
  - guestIP: "0.0.0.0"
    guestPort: 5355
    proto: any
    ignore: true

# k3s ships its own containerd — disable Lima's
containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq
      # k3s install script needs: curl, openssl (token generation), iptables
      apt-get install -y -qq curl ca-certificates openssl iptables
      # Disable swap — required by k3s (usually a no-op in cloud images)
      swapoff -a 2>/dev/null || true
      sed -i '/ swap / s/^/#/' /etc/fstab 2>/dev/null || true
      echo "✅ k3s prerequisites installed"
