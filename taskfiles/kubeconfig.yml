# =============================================================================
# taskfiles/kubeconfig.yml — Fetch kubeconfig from the server
#
# Namespace: kubeconfig
# Usage (standalone):  task kubeconfig:fetch
# Usage (from infra):  includes: kubeconfig: taskfile: ./vendor/k3s-lab/taskfiles/kubeconfig.yml
#
# Required env (from .env):
#   SERVER_IP            public IP of the k3s server
#   SSH_USER             SSH user (default: kevin)
#   KUBECONFIG_CONTEXT   kubectl context name to create/merge
# Optional env:
#   SSH_KEY, SSH_PORT    forwarded to the SSH connection
#
# Note: `task provision:site` already fetches the kubeconfig at the end of a
# full provision. Use this task only to (re)fetch it standalone.
# =============================================================================
version: '3'

tasks:
  fetch:
    desc: Fetch kubeconfig from the server and merge into ~/.kube/config
    preconditions:
      - sh: test -n "$SERVER_IP"
        msg: "SERVER_IP is not set — add it to .env"
    cmds:
      - bash {{.TASKFILE_DIR}}/../scripts/get-kubeconfig.sh "$SERVER_IP" "${SSH_USER:-kevin}" "${KUBECONFIG_CONTEXT:-k3s-lab}"
