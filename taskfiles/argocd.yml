# =============================================================================
# taskfiles/argocd.yml — ArgoCD GitOps Continuous Delivery
#
# Namespace: argocd
# Usage (standalone):  task argocd:status
# Usage (from infra):  includes: argocd: taskfile: ./vendor/k3s-lab/taskfiles/argocd.yml
#
# Required env (from .env or cluster.env):
#   KUBECONFIG_CONTEXT
#   ARGOCD_DOMAIN        e.g. argocd.example.com
#   SERVER_IP            for deploy post-install hint
#
# Vars (override via includes vars:):
#   ARGOCD_VERSION            default: 9.5.2
#   ARGOCD_VALUES_FILE        default: platform/argocd/values.yaml
# =============================================================================
version: '3'

vars:
  ARGOCD_VERSION: '{{.ARGOCD_VERSION | default "9.5.2"}}'
  ARGOCD_VALUES_FILE: '{{.ARGOCD_VALUES_FILE | default "platform/argocd/values.yaml"}}'
  ARGOCD_REPO_SECRET_NAME: '{{.ARGOCD_REPO_SECRET_NAME | default "argocd-repo"}}'

tasks:
  deploy:
    desc: Deploy ArgoCD via Helm (run once after bootstrap)
    preconditions:
      - sh: test -n "$ARGOCD_DOMAIN"
        msg: "ARGOCD_DOMAIN is not set — add it to cluster.env"
      - sh: test -f "{{.ARGOCD_VALUES_FILE}}"
        msg: "{{.ARGOCD_VALUES_FILE}} not found"
    cmds:
      - helm repo add argo https://argoproj.github.io/argo-helm --force-update
      - helm repo update argo
      - |
        helm upgrade --install argocd argo/argo-cd \
          --version "{{.ARGOCD_VERSION}}" \
          --namespace argocd \
          --create-namespace \
          --values {{.ARGOCD_VALUES_FILE}} \
          --set "global.domain=$ARGOCD_DOMAIN" \
          --set "configs.cm.url=https://$ARGOCD_DOMAIN" \
          --wait \
          --timeout 300s
      - cmd: |
          echo ""
          echo "  UI:       https://$ARGOCD_DOMAIN"
          echo "  User:     admin"
          echo "  Password: $(kubectl --context $KUBECONFIG_CONTEXT -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo '(secret already deleted)')"
          echo ""
          echo "Next steps:"
          echo "  1. Add DNS: $ARGOCD_DOMAIN → $SERVER_IP"
          echo "  2. task argocd:add-repo ARGOCD_REPO_URL=git@github.com:you/infra.git GITHUB_DEPLOY_KEY=~/.ssh/deploy_key"
          echo "  3. kubectl apply -f argocd/projects/ -f argocd/applicationsets/"
          echo "  4. Add GitHub webhook: https://$ARGOCD_DOMAIN/api/webhook"
        silent: true

  add-repo:
    desc: Register a Git repo in ArgoCD via SSH deploy key
    preconditions:
      - sh: test -n "$ARGOCD_REPO_URL"
        msg: "ARGOCD_REPO_URL is not set"
      - sh: test -n "$GITHUB_DEPLOY_KEY"
        msg: "GITHUB_DEPLOY_KEY is not set"
      - sh: test -f "$GITHUB_DEPLOY_KEY"
        msg: "GITHUB_DEPLOY_KEY file not found: $GITHUB_DEPLOY_KEY"
    cmds:
      - |
        kubectl --context $KUBECONFIG_CONTEXT \
          create secret generic {{.ARGOCD_REPO_SECRET_NAME}} \
          --from-literal=type=git \
          --from-literal=url="$ARGOCD_REPO_URL" \
          --from-file=sshPrivateKey="$GITHUB_DEPLOY_KEY" \
          -n argocd \
          --dry-run=client -o yaml \
        | kubectl --context $KUBECONFIG_CONTEXT apply -f -
      - |
        kubectl --context $KUBECONFIG_CONTEXT label secret {{.ARGOCD_REPO_SECRET_NAME}} \
          -n argocd argocd.argoproj.io/secret-type=repository --overwrite

  status:
    desc: Show ArgoCD app sync and health status
    cmds:
      - cmd: 'printf "\033[0;36m── ArgoCD Applications ─────────────────────────────────────────\033[0m\n"'
        silent: true
      - cmd: >-
          kubectl --context $KUBECONFIG_CONTEXT get applications -n argocd
          -o custom-columns='APP:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status'
          2>/dev/null || echo "  ❌ ArgoCD not reachable"
        ignore_error: true

  password:
    desc: Print the initial ArgoCD admin password
    cmds:
      - cmd: 'printf "\033[1;33m⚠️  Delete after first login: task argocd:delete-initial-secret\033[0m\n"'
        silent: true
      - cmd: >-
          kubectl --context $KUBECONFIG_CONTEXT -n argocd get secret argocd-initial-admin-secret
          -o jsonpath='{.data.password}' 2>/dev/null | base64 -d && echo
          || echo "✅ argocd-initial-admin-secret already deleted"
        ignore_error: true

  delete-initial-secret:
    desc: Delete argocd-initial-admin-secret (run after first OIDC login)
    cmds:
      - kubectl --context $KUBECONFIG_CONTEXT -n argocd delete secret argocd-initial-admin-secret --ignore-not-found

  disable-admin:
    desc: Disable ArgoCD local admin user (safe once OIDC is confirmed working)
    prompt: "This disables the local admin account. Ensure OIDC login works first. Continue?"
    cmds:
      - |
        kubectl --context $KUBECONFIG_CONTEXT -n argocd patch configmap argocd-cm \
          --type=merge -p '{"data":{"admin.enabled":"false"}}'
      - cmd: 'printf "\033[1;33m⚠️  To re-enable: kubectl -n argocd patch cm argocd-cm --type=merge -p '"'"'{"data":{"admin.enabled":"true"}}'"'"'\033[0m\n"'
        silent: true
