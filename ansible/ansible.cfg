[defaults]
inventory          = inventory/hosts.yml
roles_path         = roles
collections_path   = ~/.ansible/collections
retry_files_enabled = False
# Host key checking stays ON; StrictHostKeyChecking=accept-new (below) trusts
# new hosts on first contact but refuses changed keys (MITM protection).
# After a VPS rebuild, clear the old key: task ssh:known-hosts-reset
host_key_checking  = True
# YAML-formatted task output. A bare `stdout_callback = yaml` resolved to the
# community.general.yaml plugin, removed in community.general 12.0.0; the builtin
# default callback with result_format=yaml is its drop-in replacement.
stdout_callback    = ansible.builtin.default
result_format      = yaml
interpreter_python = auto_silent

[ssh_connection]
pipelining         = True
# ControlMaster/ControlPersist were Ansible's defaults already; accept-new is
# the addition. (control_master/control_persist are not valid ini keys —
# OpenSSH options belong in ssh_args.)
ssh_args           = -C -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
