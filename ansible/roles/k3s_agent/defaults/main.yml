---
# k3s_agent role defaults

k3s_version: "v1.32.13+k3s1"

# Optional integrity pin for the get.k3s.io installer script (runs as root).
# Set to e.g. "sha256:abc123..." to verify the download; empty = no check.
# Compute with: curl -fsSL https://get.k3s.io | shasum -a 256
k3s_installer_checksum: ""

# Server URL to join (set from k3s_server group)
k3s_server_url: ""

# Node token from the server (set dynamically)
k3s_node_token: ""

# Node IP for inter-node communication (private network)
k3s_node_ip: "{{ ansible_facts['default_ipv4']['address'] }}"

# Extra args for the agent
k3s_extra_agent_args: ""

# Firewall: allow traffic from private network
k3s_ufw_allow_from: "10.0.0.0/16"
