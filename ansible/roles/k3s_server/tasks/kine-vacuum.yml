---
# Install a systemd timer that periodically VACUUMs the kine SQLite datastore.
# See templates/kine-vacuum.sh.j2 for rationale.

- name: Install sqlite3 (required for VACUUM INTO)
  ansible.builtin.apt:
    name: sqlite3
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Deploy kine-vacuum script
  ansible.builtin.template:
    src: kine-vacuum.sh.j2
    dest: /usr/local/sbin/kine-vacuum.sh
    owner: root
    group: root
    mode: "0750"

- name: Deploy kine-vacuum systemd service
  ansible.builtin.template:
    src: kine-vacuum.service.j2
    dest: /etc/systemd/system/kine-vacuum.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Deploy kine-vacuum systemd timer
  ansible.builtin.template:
    src: kine-vacuum.timer.j2
    dest: /etc/systemd/system/kine-vacuum.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start kine-vacuum timer
  ansible.builtin.systemd:
    name: kine-vacuum.timer
    enabled: "{{ kine_vacuum_enabled }}"
    state: "{{ 'started' if kine_vacuum_enabled else 'stopped' }}"
    daemon_reload: true
