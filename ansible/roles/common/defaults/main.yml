---
# common role — base VPS setup for all k3s nodes
# Idempotent: safe to run multiple times

# Packages to install
common_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - open-iscsi
  - nfs-common
  - jq
  - unattended-upgrades

# Kernel modules required by k3s
common_kernel_modules:
  - overlay
  - br_netfilter

# Sysctl settings for Kubernetes networking and security hardening
common_sysctl:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
  net.ipv4.ip_forward: 1
  # Reverse path filtering — drop packets with spoofed source addresses
  net.ipv4.conf.all.rp_filter: 1
  net.ipv4.conf.default.rp_filter: 1
  # SYN flood protection
  net.ipv4.tcp_syncookies: 1
  # Log suspicious packets (martians)
  net.ipv4.conf.all.log_martians: 1
  net.ipv4.conf.default.log_martians: 1
  # Disable ICMP redirects (prevent MITM)
  net.ipv4.conf.all.send_redirects: 0
  net.ipv4.conf.default.send_redirects: 0
  net.ipv4.conf.all.accept_redirects: 0
  net.ipv4.conf.default.accept_redirects: 0
  # Ignore ICMP broadcast requests
  net.ipv4.icmp_echo_ignore_broadcasts: 1

# Disable swap
common_disable_swap: true

# UFW defaults
common_ufw_enabled: true
common_ufw_default_policy: deny
common_ufw_allow_ssh: true
common_ssh_port: 22
