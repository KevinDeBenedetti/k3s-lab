---
# common role — base VPS setup for all k3s nodes
# Idempotent: safe to run multiple times

# Packages to install
common_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - open-iscsi
  - nfs-common
  - jq
  - unattended-upgrades

# Kernel modules required by k3s
common_kernel_modules:
  - overlay
  - br_netfilter

# Sysctl settings for Kubernetes networking
common_sysctl:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
  net.ipv4.ip_forward: 1

# Disable swap
common_disable_swap: true

# UFW defaults
common_ufw_enabled: true
common_ufw_default_policy: deny
common_ufw_allow_ssh: true
common_ssh_port: 22
