---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Load kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ common_kernel_modules }}"

- name: Persist kernel modules across reboots
  ansible.builtin.lineinfile:
    path: /etc/modules-load.d/k3s.conf
    line: "{{ item }}"
    create: true
    mode: "0644"
  loop: "{{ common_kernel_modules }}"

- name: Apply sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-k3s.conf
    reload: true
    state: present
  loop: "{{ common_sysctl | dict2items }}"

- name: Disable swap
  when: common_disable_swap
  block:
    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap entries from fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '\sswap\s'
        state: absent

- name: Configure UFW
  when: common_ufw_enabled
  block:
    - name: Set UFW default incoming policy
      community.general.ufw:
        default: "{{ common_ufw_default_policy }}"
        direction: incoming

    - name: Allow SSH through UFW
      community.general.ufw:
        rule: allow
        port: "{{ common_ssh_port }}"
        proto: tcp
      when: common_ufw_allow_ssh

    - name: Enable UFW
      community.general.ufw:
        state: enabled

- name: Configure login MOTD (server overview on SSH login)
  when: common_motd_enabled
  tags: [motd]
  block:
    - name: Ensure update-motd.d directory exists
      ansible.builtin.file:
        path: /etc/update-motd.d
        state: directory
        mode: "0755"

    - name: Deploy dynamic MOTD script
      ansible.builtin.template:
        src: motd-k3s-info.sh.j2
        dest: /etc/update-motd.d/10-k3s-info
        mode: "0755"

# chkrootkit's daily scan emails its report via `mail`, but k3s nodes have no MTA
# → chkrootkit.service exits 127 ("mail: not found") and shows as a failed unit.
# Set MAILTO="" so the report goes to stdout (captured by the systemd journal /
# /var/log/chkrootkit) instead of being mailed. Guarded: only acts if chkrootkit
# is actually installed (it is not pulled in by this role).
- name: Detect chkrootkit daily config
  ansible.builtin.stat:
    path: /etc/chkrootkit/chkrootkit.conf
  register: chkrootkit_conf
  tags: [chkrootkit]

- name: Set chkrootkit daily scan to log-only (no MTA on k3s nodes)
  ansible.builtin.lineinfile:
    path: /etc/chkrootkit/chkrootkit.conf
    regexp: '^MAILTO='
    line: 'MAILTO=""'
  when: chkrootkit_conf.stat.exists
  tags: [chkrootkit]
