---
- name: Configure WireGuard VPN
  when: wireguard_enabled | default(false) | bool
  block:
    - name: Install WireGuard
      ansible.builtin.apt:
        name: wireguard
        state: present
        update_cache: true

    - name: Check if private key file exists
      ansible.builtin.stat:
        path: /etc/wireguard/private.key
      register: wg_key_stat

    - name: Extract existing private key from wg0.conf
      ansible.builtin.shell:
        cmd: grep -oP '(?<=PrivateKey\s=\s).+' /etc/wireguard/{{ wireguard_interface }}.conf
      register: wg_existing_key
      changed_when: false
      failed_when: false
      when: not wg_key_stat.stat.exists

    - name: Save existing private key to file
      ansible.builtin.copy:
        content: "{{ wg_existing_key.stdout | trim }}"
        dest: /etc/wireguard/private.key
        mode: "0600"
      when:
        - not wg_key_stat.stat.exists
        - wg_existing_key.rc == 0
        - wg_existing_key.stdout | trim | length > 0

    - name: Generate server private key
      ansible.builtin.command:
        cmd: wg genkey
      register: wg_new_key
      changed_when: true
      when:
        - not wg_key_stat.stat.exists
        - wg_existing_key.rc != 0 or wg_existing_key.stdout | trim | length == 0

    - name: Save new private key to file
      ansible.builtin.copy:
        content: "{{ wg_new_key.stdout }}"
        dest: /etc/wireguard/private.key
        mode: "0600"
      when:
        - not wg_key_stat.stat.exists
        - wg_new_key is changed

    - name: Read server private key
      ansible.builtin.slurp:
        src: /etc/wireguard/private.key
      register: wg_private_key_file

    - name: Derive server public key
      ansible.builtin.shell:
        cmd: echo "{{ wg_private_key_file.content | b64decode | trim }}" | wg pubkey
      register: wg_public_key
      changed_when: false

    - name: Set WireGuard key facts
      ansible.builtin.set_fact:
        wireguard_server_public_key: "{{ wg_public_key.stdout | trim }}"
        wireguard_server_private_key: "{{ wg_private_key_file.content | b64decode | trim }}"

    - name: Deploy WireGuard configuration
      ansible.builtin.template:
        src: wg0.conf.j2
        dest: "/etc/wireguard/{{ wireguard_interface }}.conf"
        mode: "0600"
      notify: Restart WireGuard

    - name: Enable IPv6 forwarding for WireGuard
      ansible.posix.sysctl:
        name: net.ipv6.conf.all.forwarding
        value: "1"
        sysctl_file: /etc/sysctl.d/99-wireguard.conf
        reload: true

    - name: Enable and start WireGuard
      ansible.builtin.systemd:
        name: "wg-quick@{{ wireguard_interface }}"
        state: started
        enabled: true
