---
# wireguard role defaults

wireguard_enabled: false

wireguard_port: 51820
wireguard_interface: wg0
wireguard_server_ip: "10.8.0.1/24"
wireguard_subnet: "10.8.0.0/24"

# Network interface for NAT masquerade (auto-detected if not set)
wireguard_network_interface: "{{ ansible_default_ipv4.interface | default('eth0') }}"

# Peers list — define in group_vars or host_vars
# wireguard_peers:
#   - name: laptop
#     public_key: "..."
#     allowed_ips: "10.8.0.2/32"
wireguard_peers: []
