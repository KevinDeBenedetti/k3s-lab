# =============================================================================
# platform-traefik — sensible defaults for single-node k3s
# Override per-cluster in infra/platform/traefik/values.yaml
# =============================================================================
traefik:
  fullnameOverride: traefik

  # Install Traefik CRDs (IngressRoute, Middleware, etc.)
  ingressRoute:
    dashboard:
      enabled: false

  # Entrypoints
  ports:
    web:
      port: 8000
      exposedPort: 80
      redirectTo:
        port: websecure
    websecure:
      port: 8443
      exposedPort: 443

  # Resource limits for single-node
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

  # Logs
  logs:
    general:
      level: INFO
    access:
      enabled: true

  # Providers
  providers:
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: true
    kubernetesIngress:
      enabled: true

  # Service type — LoadBalancer for bare metal (k3s klipper-lb or metallb)
  service:
    type: LoadBalancer
