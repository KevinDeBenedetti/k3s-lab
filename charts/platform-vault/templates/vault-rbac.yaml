# =============================================================================
# Vault — Kubernetes service_registration RBAC
#
# Grants the vault ServiceAccount permission to read and update its own pod
# status. Required by the "service_registration kubernetes {}" stanza so Vault
# can mark itself as active/standby in the Kubernetes API.
# =============================================================================
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-service-registration
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-service-registration
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-service-registration
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: {{ .Release.Namespace }}
