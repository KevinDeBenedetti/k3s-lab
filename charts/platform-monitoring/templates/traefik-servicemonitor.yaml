# =============================================================================
# Traefik ServiceMonitor
# Applied as part of the platform-monitoring chart.
# Managed independently of the Traefik Helm release to avoid schema conflicts.
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: traefik
  namespace: ingress
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/instance: traefik-ingress
spec:
  namespaceSelector:
    matchNames:
      - ingress
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: traefik-ingress
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
