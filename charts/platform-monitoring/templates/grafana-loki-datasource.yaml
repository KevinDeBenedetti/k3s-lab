apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-loki-datasource
  namespace: "{{ .Release.Namespace }}"
  labels:
    grafana_datasource: "1"
data:
  loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki.{{ .Release.Namespace }}.svc.cluster.local:3100
        isDefault: true
