apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-kubernetes-dashboard
  namespace: "{{ .Release.Namespace }}"
  labels:
    grafana_dashboard: "1"
data:
  kubernetes-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisBorderShow": false, "fillOpacity": 20, "lineWidth": 1, "stacking": {"mode": "none"}}, "unit": "percentunit"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "id": 1,
          "targets": [
            {
              "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))",
              "legendFormat": "CPU Usage",
              "refId": "A"
            }
          ],
          "title": "Node CPU Usage",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisBorderShow": false, "fillOpacity": 20, "lineWidth": 1, "stacking": {"mode": "none"}}, "unit": "bytes"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "id": 2,
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes",
              "legendFormat": "Used",
              "refId": "A"
            },
            {
              "expr": "node_memory_MemTotal_bytes",
              "legendFormat": "Total",
              "refId": "B"
            }
          ],
          "title": "Node Memory Usage",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisBorderShow": false, "fillOpacity": 20, "lineWidth": 1, "stacking": {"mode": "normal"}}, "unit": "bytes"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "targets": [
            {
              "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\", container!=\"POD\"})",
              "legendFormat": "{{ "{{namespace}}" }}",
              "refId": "A"
            }
          ],
          "title": "Memory by Namespace",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisBorderShow": false, "fillOpacity": 20, "lineWidth": 1, "stacking": {"mode": "normal"}}, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "targets": [
            {
              "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\", container!=\"POD\"}[5m]))",
              "legendFormat": "{{ "{{namespace}}" }}",
              "refId": "A"
            }
          ],
          "title": "CPU by Namespace",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]}, "unit": "percentunit"},
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 16},
          "id": 5,
          "targets": [
            {
              "expr": "1 - (node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"})",
              "refId": "A"
            }
          ],
          "title": "Disk Usage (/)",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 6, "x": 6, "y": 16},
          "id": 6,
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Running",
              "refId": "A"
            },
            {
              "expr": "sum(kube_pod_status_phase{phase!=\"Running\", phase!=\"Succeeded\"})",
              "legendFormat": "Not Ready",
              "refId": "B"
            }
          ],
          "title": "Pod Status",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 6, "x": 12, "y": 16},
          "id": 7,
          "targets": [
            {
              "expr": "count(kube_node_info)",
              "legendFormat": "Nodes",
              "refId": "A"
            }
          ],
          "title": "Node Count",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 6, "x": 18, "y": 16},
          "id": 8,
          "targets": [
            {
              "expr": "count(kube_namespace_labels)",
              "legendFormat": "Namespaces",
              "refId": "A"
            }
          ],
          "title": "Namespace Count",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["kubernetes", "prometheus"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "title": "Kubernetes Overview",
      "uid": "kubernetes-overview",
      "version": 1
    }
