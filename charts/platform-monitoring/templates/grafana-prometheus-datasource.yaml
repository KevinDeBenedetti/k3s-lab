apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-prometheus-datasource
  namespace: "{{ .Release.Namespace }}"
  labels:
    grafana_datasource: "1"
data:
  prometheus-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-kube-prometheus-prometheus.{{ .Release.Namespace }}.svc.cluster.local:9090
        isDefault: false
        jsonData:
          timeInterval: "30s"
