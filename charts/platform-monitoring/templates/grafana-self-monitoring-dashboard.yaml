apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-self-monitoring-dashboard
  namespace: "{{ .Release.Namespace }}"
  labels:
    grafana_dashboard: "1"
data:
  grafana-self-monitoring.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "fixed", "fixedColor": "green"}, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "targets": [
            {
              "expr": "grafana_stat_totals_dashboard",
              "legendFormat": "Dashboards",
              "refId": "A"
            }
          ],
          "title": "Total Dashboards",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "fixed", "fixedColor": "blue"}, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "targets": [
            {
              "expr": "grafana_stat_total_users",
              "legendFormat": "Users",
              "refId": "A"
            }
          ],
          "title": "Total Users",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "fixed", "fixedColor": "orange"}, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "targets": [
            {
              "expr": "grafana_stat_totals_datasource",
              "legendFormat": "Datasources",
              "refId": "A"
            }
          ],
          "title": "Total Datasources",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "red", "value": 0.5}]}, "unit": "percentunit"},
            "overrides": []
          },
          "gridPos": {"h": 6, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "targets": [
            {
              "expr": "rate(grafana_api_response_status_total{status_code=~\"5..\"}[5m]) / rate(grafana_api_response_status_total[5m])",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ],
          "title": "API Error Rate",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisBorderShow": false, "fillOpacity": 20, "lineWidth": 1, "stacking": {"mode": "normal"}}, "unit": "reqps"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 6},
          "id": 5,
          "targets": [
            {
              "expr": "sum by (status_code) (rate(grafana_api_response_status_total[5m]))",
              "legendFormat": "HTTP {{ "{{status_code}}" }}",
              "refId": "A"
            }
          ],
          "title": "API Request Rate by Status",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisBorderShow": false, "fillOpacity": 20, "lineWidth": 1, "stacking": {"mode": "none"}}, "unit": "s"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 14},
          "id": 6,
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(grafana_api_response_status_total[5m])))",
              "legendFormat": "p99",
              "refId": "A"
            }
          ],
          "title": "API Latency p99",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "palette-classic"}, "custom": {"axisBorderShow": false, "fillOpacity": 20, "lineWidth": 1, "stacking": {"mode": "none"}}, "unit": "bytes"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 14},
          "id": 7,
          "targets": [
            {
              "expr": "process_resident_memory_bytes{job=~\".*grafana.*\"}",
              "legendFormat": "Grafana RSS",
              "refId": "A"
            }
          ],
          "title": "Grafana Memory Usage",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}, "unit": "short"},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 22},
          "id": 8,
          "options": {
            "showHeader": true
          },
          "targets": [
            {
              "expr": "grafana_datasource_request_duration_seconds_count",
              "format": "table",
              "refId": "A"
            }
          ],
          "title": "Datasource Request Counts",
          "type": "table"
        }
      ],
      "refresh": "1m",
      "schemaVersion": 39,
      "tags": ["grafana", "self-monitoring"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "title": "Grafana Self-Monitoring",
      "uid": "grafana-self-monitoring",
      "version": 1
    }
