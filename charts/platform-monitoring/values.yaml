# VPS-optimized monitoring defaults (8GB single-node)

# ─── Dashboard toggles (disable dashboards for components not deployed) ───
dashboards:
  falco:
    enabled: true
  tetragon:
    enabled: true
  trivy:
    enabled: true

grafana:
  fullnameOverride: monitoring-grafana
  admin:
    existingSecret: grafana-admin-secret
    userKey: username
    passwordKey: password
  persistence:
    enabled: true
    size: 2Gi
  initChownData:
    enabled: false
  ingress:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 150Mi
    limits:
      cpu: 100m
      memory: 300Mi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
    datasources:
      enabled: true
  envFromSecrets:
    - name: grafana-oauth-secret
      optional: true

loki:
  fullnameOverride: loki
  deploymentMode: SingleBinary
  loki:
    auth_enabled: true
    commonConfig:
      replication_factor: 1
    storage:
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
      type: filesystem
      filesystem:
        chunks_directory: /var/loki/chunks
        rules_directory: /var/loki/rules
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    ingester:
      chunk_idle_period: 30m
      max_chunk_age: 1h
    limits_config:
      ingestion_rate_mb: 5
      ingestion_burst_size_mb: 6
      per_stream_rate_limit: "1MB"
      max_chunks_per_query: 500000
      retention_period: 168h
    query_range:
      align_queries_with_step: true
  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  gateway:
    enabled: false

promtail:
  fullnameOverride: promtail
  config:
    logLevel: info
    clients:
      - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi
