apiVersion: v2
name: platform-security
description: Runtime security — Falco, Tetragon, Trivy Operator, Kyverno
version: 1.3.0
type: application
dependencies:
  - name: falco
    version: 9.0.0
    repository: https://falcosecurity.github.io/charts
    condition: falco.enabled
  - name: falcosidekick
    version: 0.13.1
    repository: https://falcosecurity.github.io/charts
    condition: falcosidekick.enabled
  - name: tetragon
    version: 1.7.0
    repository: https://helm.cilium.io
    condition: tetragon.enabled
  - name: trivy-operator
    version: 0.32.1
    repository: https://aquasecurity.github.io/helm-charts
    condition: trivy-operator.enabled
  - name: kyverno
    version: 3.8.1
    repository: https://kyverno.github.io/kyverno/
    condition: kyverno.enabled
