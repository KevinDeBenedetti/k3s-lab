{{- if .Values.kyverno.enabled }}
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-ro-rootfs
  annotations:
    policies.kyverno.io/title: Require Read-Only Root Filesystem
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: low
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Read-only root filesystem prevents malicious actors from writing to the container
      filesystem. This policy requires readOnlyRootFilesystem: true.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: readonly-root-filesystem
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - argocd
                - vault
                - monitoring
                - external-secrets
                - cert-manager
                - ingress
      validate:
        message: "Containers must use read-only root filesystem (securityContext.readOnlyRootFilesystem: true)."
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true
{{- end }}
