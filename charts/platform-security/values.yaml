# Enable/disable individual security tools
falco:
  enabled: true
  fullnameOverride: falco
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 400m
      memory: 512Mi

falcosidekick:
  enabled: true
  config:
    webhook:
      address: ""       # override in infra-private (e.g. Slack, PagerDuty URL)
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

tetragon:
  enabled: true
  fullnameOverride: tetragon
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

trivy-operator:
  enabled: true
  fullnameOverride: trivy-operator
  operator:
    scannerReportTTL: "24h"
  trivy:
    ignoreUnfixed: true
  nodeCollector:
    enabled: true
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 400m
      memory: 512Mi
