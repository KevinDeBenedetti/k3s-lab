# Enable/disable individual security tools
falco:
  enabled: true
  fullnameOverride: falco
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 400m
      memory: 512Mi

falcosidekick:
  enabled: false

tetragon:
  enabled: true
  fullnameOverride: tetragon
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

trivy-operator:
  enabled: true
  fullnameOverride: trivy-operator
  operator:
    scannerReportTTL: "24h"
  trivy:
    ignoreUnfixed: true
  nodeCollector:
    enabled: false
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 400m
      memory: 512Mi
