{{- if or .Values.jobCore.enabled .Values.jobApps.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-seeder
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "platform-vault-seeder.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-seeder
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "platform-vault-seeder.labels" . | nindent 4 }}
rules:
# View other jobs in the namespace (for initContainer wait logic)
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-seeder
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "platform-vault-seeder.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-seeder
subjects:
- kind: ServiceAccount
  name: vault-seeder
  namespace: {{ .Values.namespace.name }}
---
# The seeder scripts run `kubectl exec` against the Vault pod, which lives in
# the Vault namespace — grant pod get + exec there (and only there).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-seeder-exec
  namespace: {{ .Values.global.vaultNamespace }}
  labels:
    {{- include "platform-vault-seeder.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-seeder-exec
  namespace: {{ .Values.global.vaultNamespace }}
  labels:
    {{- include "platform-vault-seeder.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-seeder-exec
subjects:
- kind: ServiceAccount
  name: vault-seeder
  namespace: {{ .Values.namespace.name }}
{{- end }}
