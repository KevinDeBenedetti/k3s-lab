# platform-vault-seeder — Values Example
#
# This file shows the recommended way to configure the vault-seeder chart
# for typical cluster bootstrap scenarios.
#
# Usage:
#   helm install vault-seeder ./charts/platform-vault-seeder \
#     -n vault-seeder --create-namespace \
#     -f examples/vault-seeder-values.yaml
#
# All secret values should be sourced from:
#   - VAULT_ROOT_TOKEN (from bootstrap)
#   - .env file (gitignored in infra repo)
#   - Environment variables

# ── Namespace ──────────────────────────────────────────────────────────────
namespace:
  create: true
  name: vault-seeder

# ── Enable/Disable Jobs ─────────────────────────────────────────────────────
# Run core job first, then apps job (sequential)
jobCore:
  enabled: true

jobApps:
  enabled: true

# ── Global Kubernetes/Vault Settings ───────────────────────────────────────
# (no kubeContext — the jobs use the in-cluster service account config)
global:
  vaultNamespace: vault
  vaultPod: vault-0

# ── Secrets (from .env / environment) ──────────────────────────────────────
#
# IMPORTANT: These are sensitive. DO NOT commit to Git.
# NOTE: plain Helm does NOT expand `{{ env "VAR" }}` inside values files
# (that is a helmfile feature). Pass real values via:
#   1. helm --set secrets.vaultRootToken="$VAULT_ROOT_TOKEN" (CLI, from env)
#   2. A separate gitignored secrets.yaml file (see below)
#   3. An ExternalSecret / sealed-secret rendered before install
#
# Non-secret values can stay in this file:
secrets:
  # ── OIDC endpoints (non-secret) ─────────────────────────────────────────
  oidcProviderName: "Infomaniak"  # Display name
  oidcDiscoveryUrl: "https://login.infomaniak.com"  # Vault discovers .well-known/openid-configuration
  oidcAuthUrl: "https://login.infomaniak.com/authorize"
  oidcTokenUrl: "https://login.infomaniak.com/token"
  oidcApiUrl: "https://login.infomaniak.com/userinfo"
  vaultDomain: "vault.kevindb.dev"  # For OIDC redirect URIs
  adminEmail: "admin@example.com"   # REQUIRED for OIDC — bound_claims restricts vault-admin to this account
  githubUser: "KevinDeBenedetti"

  # ── Secret values — set via --set or a gitignored file, NOT here ────────
  # vaultRootToken          (REQUIRED — from vault:init bootstrap)
  # oidcClientId            (empty = skip OIDC configuration)
  # oidcClientSecret
  # argocdServerSecretKey   (random string)
  # homepageArgocdToken     (optional)
  # grafanaPassword
  # ghcrPat                 (GitHub PAT with read:packages)
  # rrAuthSecret, rrDbPassword, rrBrowserlessToken,
  # rrDatabaseUrl, rrPrinterEndpoint, rrS3AccessKeyId, rrS3SecretAccessKey

# ── Installation via Helm CLI ───────────────────────────────────────────────
#
# Step 1: Create secrets.yaml (gitignored)
#   cat > /tmp/vault-seeder-secrets.yaml <<EOF
#   secrets:
#     vaultRootToken: "hvs.xxx..."
#     oidcClientId: "my-client"
#     oidcClientSecret: "secret..."
#     argocdServerSecretKey: "random-key..."
#     grafanaPassword: "admin-pw..."
#     ghcrPat: "ghcr_xxx..."
#     rrAuthSecret: "rrauth-xxx..."
#   # etc.
#   EOF
#
# Step 2: Install chart
#   helm install vault-seeder ./charts/platform-vault-seeder \
#     -n vault-seeder --create-namespace \
#     -f examples/vault-seeder-values.yaml \
#     -f /tmp/vault-seeder-secrets.yaml
#
# Step 3: Watch jobs
#   kubectl -n vault-seeder logs -f job/vault-seeder-core
#   kubectl -n vault-seeder logs -f job/vault-seeder-apps
#
# ── Installation via ArgoCD ────────────────────────────────────────────────
#
# Create argocd/applications/vault-seeder.yaml:
#
#   apiVersion: argoproj.io/v1alpha1
#   kind: Application
#   metadata:
#     name: vault-seeder
#     namespace: argocd
#   spec:
#     project: platform
#     source:
#       repoURL: "oci://ghcr.io/kevindebenedetti/charts"
#       chart: platform-vault-seeder
#       targetRevision: "0.1.3"
#       helm:
#         releaseName: vault-seeder
#         valuesObject:
#           namespace:
#             create: true
#             name: vault-seeder
#           secrets:
#             # Pull from ExternalSecret / sealed-secrets
#             vaultRootToken: "{{ VAULT_ROOT_TOKEN }}"
#             oidcClientId: "{{ OIDC_CLIENT_ID }}"
#             # ...
#     destination:
#       server: https://kubernetes.default.svc
#       namespace: vault-seeder
#     syncPolicy:
#       automated:
#         prune: true
#         selfHeal: true
