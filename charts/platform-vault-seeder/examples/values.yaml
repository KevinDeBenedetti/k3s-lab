# platform-vault-seeder — Values Example
#
# This file shows the recommended way to configure the vault-seeder chart
# for typical cluster bootstrap scenarios.
#
# Usage:
#   helm install vault-seeder ./charts/platform-vault-seeder \
#     -n vault-seeder --create-namespace \
#     -f examples/vault-seeder-values.yaml
#
# All secret values should be sourced from:
#   - VAULT_ROOT_TOKEN (from bootstrap)
#   - .env file (gitignored in infra repo)
#   - Environment variables

# ── Namespace ──────────────────────────────────────────────────────────────
namespace:
  create: true
  name: vault-seeder

# ── Enable/Disable Jobs ─────────────────────────────────────────────────────
# Run core job first, then apps job (sequential)
jobCore:
  enabled: true

jobApps:
  enabled: true

# ── Global Kubernetes/Vault Settings ───────────────────────────────────────
# (no kubeContext — the jobs use the in-cluster service account config)
global:
  vaultNamespace: vault
  vaultPod: vault-0

# ── Secrets (from .env / environment) ──────────────────────────────────────
#
# IMPORTANT: These are sensitive. DO NOT commit to Git.
# Pass via:
#   1. helm --set (CLI)
#   2. Separate secrets.yaml file (gitignored)
#   3. ExternalSecret pulling from Vault/sealed-secrets
#
secrets:
  # ── Vault (REQUIRED) ────────────────────────────────────────────────────
  vaultRootToken: "{{ env \"VAULT_ROOT_TOKEN\" }}"  # From bootstrap

  # ── OIDC (for argocd + grafana oauth) ───────────────────────────────────
  # Set to empty string to skip OIDC configuration
  oidcClientId: "{{ env \"OIDC_CLIENT_ID\" }}"  # e.g., "my-keycloak-client"
  oidcClientSecret: "{{ env \"OIDC_CLIENT_SECRET\" }}"
  oidcProviderName: "Infomaniak"  # Display name  oidcDiscoveryUrl: "https://login.infomaniak.com"  # Vault discovers .well-known/openid-configuration  oidcAuthUrl: "https://login.infomaniak.com/authorize"
  oidcTokenUrl: "https://login.infomaniak.com/token"
  oidcApiUrl: "https://login.infomaniak.com/userinfo"
  vaultDomain: "vault.kevindb.dev"  # For OIDC redirect URIs
  adminEmail: "{{ env \"ADMIN_EMAIL\" }}"  # e.g., "admin@example.com"

  # ── ArgoCD ──────────────────────────────────────────────────────────────
  # argocd/oidc ExternalSecret
  argocdServerSecretKey: "{{ env \"ARGOCD_SERVER_SECRET_KEY\" }}"  # Random string
  homepageArgocdToken: "{{ env \"HOMEPAGE_ARGOCD_TOKEN\" }}"  # Optional

  # ── Grafana ─────────────────────────────────────────────────────────────
  # grafana/admin + grafana/oauth ExternalSecrets
  grafanaPassword: "{{ env \"GRAFANA_PASSWORD\" }}"

  # ── GHCR (GitHub Container Registry) ────────────────────────────────────
  # ghcr/pull ExternalSecret (for private image pulls)
  ghcrPat: "{{ env \"GHCR_PAT\" }}"  # GitHub PAT with read:packages
  githubUser: "KevinDeBenedetti"

  # ── Reactive Resume ─────────────────────────────────────────────────────
  # reactive-resume/prod ExternalSecret
  rrAuthSecret: "{{ env \"RR_AUTH_SECRET\" }}"  # Random string for session auth
  rrDbPassword: "{{ env \"RR_DB_PASSWORD\" }}"
  rrBrowserlessToken: "{{ env \"RR_BROWSERLESS_TOKEN\" }}"
  rrDatabaseUrl: "{{ env \"RR_DATABASE_URL\" }}"  # e.g., "postgresql://user:pw@host/db"
  rrPrinterEndpoint: "{{ env \"RR_PRINTER_ENDPOINT\" }}"  # e.g., "ws://browserless:3000?token=..."
  rrS3AccessKeyId: "{{ env \"RR_S3_ACCESS_KEY_ID\" }}"
  rrS3SecretAccessKey: "{{ env \"RR_S3_SECRET_ACCESS_KEY\" }}"

# ── Installation via Helm CLI ───────────────────────────────────────────────
#
# Step 1: Create secrets.yaml (gitignored)
#   cat > /tmp/vault-seeder-secrets.yaml <<EOF
#   secrets:
#     vaultRootToken: "hvs.xxx..."
#     oidcClientId: "my-client"
#     oidcClientSecret: "secret..."
#     argocdServerSecretKey: "random-key..."
#     grafanaPassword: "admin-pw..."
#     ghcrPat: "ghcr_xxx..."
#     rrAuthSecret: "rrauth-xxx..."
#   # etc.
#   EOF
#
# Step 2: Install chart
#   helm install vault-seeder ./charts/platform-vault-seeder \
#     -n vault-seeder --create-namespace \
#     -f examples/vault-seeder-values.yaml \
#     -f /tmp/vault-seeder-secrets.yaml
#
# Step 3: Watch jobs
#   kubectl -n vault-seeder logs -f job/vault-seeder-core
#   kubectl -n vault-seeder logs -f job/vault-seeder-apps
