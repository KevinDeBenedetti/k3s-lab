# =============================================================================
# prek.toml — git hook configuration (https://prek.j178.dev)
# prek is a faster, dependency-free alternative to pre-commit (written in Rust)
#
# Install prek:   brew install j178/tap/prek
# Install hooks:  prek install       (run once after cloning)
# Run all:        prek run --all-files    (or: make lint)
# Run staged:     prek run
# Update revs:    prek autoupdate
# =============================================================================

minimum_prek_version = "0.3.0"
fail_fast = false
default_install_hook_types = ["pre-commit", "pre-push"]

# ─── General file hygiene ───────────────────────────────────────────────────
[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
  { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"] },
  { id = "end-of-file-fixer" },
  # --allow-multiple-documents: Kubernetes files use multiple --- separated docs
  # exclude Helm values files that embed Go template syntax ({{ }})
  { id = "check-yaml", args = ["--allow-multiple-documents"], exclude = "^(kubernetes/.*/.*-values\\.yaml|charts/.*/templates/.*\\.yaml)$" },
  { id = "check-merge-conflict" },
  { id = "check-executables-have-shebangs" },
  { id = "check-shebang-scripts-are-executable" },
  { id = "detect-private-key" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
]

# ─── Shell script linting ───────────────────────────────────────────────────
[[repos]]
repo = "https://github.com/shellcheck-py/shellcheck-py"
rev = "v0.10.0.1"
hooks = [
  { id = "shellcheck", args = ["--severity=warning", "--shell=bash"], files = "\\.sh$" },
]

# ─── GitHub Actions workflow linting ────────────────────────────────────────
[[repos]]
repo = "https://github.com/rhysd/actionlint"
rev = "v1.7.10"
hooks = [
  { id = "actionlint" },
]

# ─── Docs link safety ────────────────────────────────────────────────────────
[[repos]]
repo = "https://github.com/KevinDeBenedetti/github-workflows"
rev = "bfa0ca537a45e0d359ed3050005fe06a5ea11cbc"
hooks = [
  { id = "check-docs-links" },
]

# ─── Local hooks ────────────────────────────────────────────────────────────
[[repos]]
repo = "local"

[[repos.hooks]]
id = "kubeconform"
name = "kubeconform — Kubernetes schema validation"
# Validates manifests against official Kubernetes API schemas (no cluster needed).
# Install: brew install kubeconform
language = "system"
entry = "bash -c 'which kubeconform >/dev/null 2>&1 && kubeconform -strict -summary -schema-location default -schema-location \"https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json\" \"$@\" || echo \"⚠️  kubeconform not installed — skipping (brew install kubeconform)\"' --"
files = "^kubernetes/.*\\.yaml$"
exclude = ".*(kustomization\\.yaml|-values\\.yaml)$"
pass_filenames = true

[[repos.hooks]]
id = "no-env-commit"
name = "Block .env commit"
# Belt-and-suspenders on top of .gitignore — refuse to commit real secrets.
language = "system"
entry = "bash -c 'for f in \"$@\"; do echo \"❌ Refusing to commit $f — contains secrets\"; exit 1; done' --"
files = "^\\.env$"
pass_filenames = true
