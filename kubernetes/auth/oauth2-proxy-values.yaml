# =============================================================================
# oauth2-proxy Helm Values — OIDC ForwardAuth Gateway
# Chart: oauth2-proxy/oauth2-proxy
#
# Protects upstream apps via Traefik ForwardAuth middleware.
# Works with any OIDC provider (Infomaniak, Google, GitHub, Keycloak, etc.).
#
# Required secrets (set via --set or ExternalSecret):
#   - config.clientID
#   - config.clientSecret
#   - config.cookieSecret       (generate: openssl rand -base64 32 | tr -- '+/' '-_')
#
# Usage:
#   helm repo add oauth2-proxy https://oauth2-proxy.github.io/manifests
#   helm upgrade --install oauth2-proxy oauth2-proxy/oauth2-proxy \
#     -n auth --create-namespace \
#     -f kubernetes/auth/oauth2-proxy-values.yaml \
#     --set config.clientID="<OIDC_CLIENT_ID>" \
#     --set config.clientSecret="<OIDC_CLIENT_SECRET>" \
#     --set config.cookieSecret="<COOKIE_SECRET>"
# =============================================================================

config:
  # ── OIDC Provider ──────────────────────────────────────────────────────────
  # Replace with your provider's URLs and allowed email domains.
  configFile: |-
    # Provider
    provider = "oidc"
    provider_display_name = "OIDC Provider"
    oidc_issuer_url = "https://login.provider.example/.well-known/openid-configuration"

    # Redirect URL — must match the OIDC client redirect URI
    redirect_url = "https://auth.example.com/oauth2/callback"

    # Access control
    email_domains = ["*"]
    # allowed_emails = ["admin@example.com"]

    # Cookie
    cookie_domains = [".example.com"]
    cookie_secure = true
    cookie_samesite = "lax"
    cookie_csrf_per_request = true
    cookie_csrf_expire = "5m"

    # Reverse proxy mode (ForwardAuth)
    reverse_proxy = true
    set_xauthrequest = true
    set_authorization_header = true

    # Upstream — static 202 (Traefik handles routing, not oauth2-proxy)
    upstreams = ["static://202"]

    # Scopes
    scope = "openid email profile"

    # Skip authentication for health endpoints
    skip_auth_routes = ["/api/health/.*"]

    # Silence /ping from access logs
    silence_ping_logging = true

# ── Service ──────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  portNumber: 80

# ── Resources ────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

# ── Pod Security ─────────────────────────────────────────────────────────────
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL
