# =============================================================================
# Grafana OAuth/OIDC — Helm Values Overlay
#
# Enables Generic OAuth login for Grafana via any OIDC provider.
# Use as an additional -f overlay on top of kube-prometheus-values.yaml:
#
#   helm upgrade --install kube-prometheus-stack \
#     prometheus-community/kube-prometheus-stack \
#     -n monitoring \
#     -f kubernetes/monitoring/kube-prometheus-values.yaml \
#     -f kubernetes/monitoring/grafana-oauth-values.yaml
#
# Secrets are injected via ExternalSecret (see examples/multi-env-secret.yaml).
# The envFromSecret below references the K8s Secret created by ESO.
# =============================================================================

grafana:
  # ── Inject OIDC secrets from Vault (via ExternalSecret) ──────────────────
  envFromSecret: grafana-oauth-secret

  # ── OAuth configuration ──────────────────────────────────────────────────
  grafana.ini:
    server:
      root_url: "https://grafana.example.com"
    auth.generic_oauth:
      enabled: true
      name: "OIDC Provider"
      allow_sign_up: true
      auto_login: false

      # These reference env vars injected from the Secret above
      client_id: "$__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}"
      client_secret: "$__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}"

      # Replace with your OIDC provider URLs
      auth_url: "https://login.provider.example/authorize"
      token_url: "https://login.provider.example/token"
      api_url: "https://login.provider.example/userinfo"

      scopes: "openid email profile"
      email_attribute_path: "email"
      login_attribute_path: "email"
      name_attribute_path: "name"

      # Role mapping (optional)
      role_attribute_path: "contains(groups[*], 'admin') && 'Admin' || 'Viewer'"

    auth:
      # Disable other auth methods if OIDC is the only login path
      # disable_login_form: true
      signout_redirect_url: "https://login.provider.example/logout"
