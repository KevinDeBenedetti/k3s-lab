# =============================================================================
# Grafana — Traefik IngressRoute + TLS Certificate
# Exposes Grafana at https://${GRAFANA_DOMAIN}
# Applied via: envsubst < grafana-ingress.yaml | kubectl apply -f -
#
# Auth: Grafana handles its own authentication via Infomaniak OIDC (generic_oauth).
# =============================================================================

# -- IngressRoute: HTTPS
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${GRAFANA_DOMAIN}`)
      kind: Rule
      middlewares:
        - name: vpn-only
          namespace: monitoring
      services:
        - name: kube-prometheus-stack-grafana
          namespace: monitoring
          port: 80
  tls:
    secretName: grafana-tls

# -- IngressRoute: HTTP → HTTPS redirect
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-http-redirect
  namespace: monitoring
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`${GRAFANA_DOMAIN}`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
          namespace: monitoring
      services:
        - name: kube-prometheus-stack-grafana
          namespace: monitoring
          port: 80

# -- Middleware: HTTP → HTTPS redirect (scoped to monitoring namespace)
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: monitoring
spec:
  redirectScheme:
    scheme: https
    permanent: true

# -- Middleware: VPN-only (scoped to monitoring namespace)
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: vpn-only
  namespace: monitoring
spec:
  ipAllowList:
    sourceRange:
      - 10.8.0.0/24   # WireGuard tunnel — only reachable when VPN is connected

# -- Certificate
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-tls
  namespace: monitoring
spec:
  secretName: grafana-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - ${GRAFANA_DOMAIN}
