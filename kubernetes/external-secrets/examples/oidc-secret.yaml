# =============================================================================
# ExternalSecret Template — OIDC Credentials
#
# Syncs OIDC client credentials from Vault into a Kubernetes Secret.
# Useful for ArgoCD, Grafana, oauth2-proxy, or any OIDC-protected service.
#
# Vault path example: secret/argocd/oidc
# =============================================================================

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: oidc-credentials
  namespace: argocd            # ← Change to target namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: argocd-secret        # ← Must match the Secret name the app expects
    creationPolicy: Merge      # Merge: doesn't overwrite other keys in existing Secret
  data:
    - secretKey: oidc.provider.clientID
      remoteRef:
        key: secret/argocd/oidc
        property: clientID
    - secretKey: oidc.provider.clientSecret
      remoteRef:
        key: secret/argocd/oidc
        property: clientSecret
