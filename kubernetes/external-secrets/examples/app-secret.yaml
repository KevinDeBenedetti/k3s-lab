# =============================================================================
# ExternalSecret Template — Single App Secret
#
# Syncs a Vault KV-v2 secret into a Kubernetes Secret.
# Requires a ClusterSecretStore named "vault" (see cluster-secret-store.yaml).
#
# Customize:
#   - metadata.name / namespace
#   - spec.target.name (the K8s Secret name your Deployment references)
#   - spec.data[].remoteRef.key (Vault path, without "data/" prefix)
#   - spec.data[].remoteRef.property (key inside the Vault secret)
# =============================================================================

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: my-app-secrets
  namespace: apps
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: my-app-secrets        # K8s Secret name (referenced by envFrom/secretRef)
    creationPolicy: Owner       # ESO owns the Secret lifecycle
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/my-app
        property: database_url
    - secretKey: API_KEY
      remoteRef:
        key: secret/my-app
        property: api_key
