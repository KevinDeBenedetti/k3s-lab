# =============================================================================
# ExternalSecret Template — Multiple Environment Variables
#
# Maps many Vault keys into a single K8s Secret (used with envFrom).
# Useful for apps like Grafana OAuth that need 10+ env vars from Vault.
#
# Vault path example: secret/grafana/oauth
# =============================================================================

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-oauth
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: grafana-oauth-secret
    creationPolicy: Owner
  data:
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
      remoteRef:
        key: secret/grafana/oauth
        property: client_id
    - secretKey: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
      remoteRef:
        key: secret/grafana/oauth
        property: client_secret
    # Add more env vars as needed — one entry per key
