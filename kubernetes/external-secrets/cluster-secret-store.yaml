# =============================================================================
# ESO ClusterSecretStore — HashiCorp Vault (KV v2)
#
# This ClusterSecretStore is cluster-wide: any namespace can reference it in
# an ExternalSecret without needing its own SecretStore.
#
# Authentication: Kubernetes auth method.
#   ESO's ServiceAccount token is exchanged for a Vault token scoped to the
#   policy bound to the requesting namespace's ServiceAccount.
#
# Prerequisites:
#   1. Vault is running and initialized  (make vault-init)
#   2. K8s auth is configured in Vault    (make vault-configure)
#   3. ESO is deployed                    (make deploy-eso)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"      # KV v2 mount path
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso"     # Vault role — see make vault-configure
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
