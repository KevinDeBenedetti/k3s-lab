# =============================================================================
# Generic Traefik IngressRoute template
# Consumed via Kustomize overlay — patch host, service name, namespace.
#
# Includes:
#   - HTTPS IngressRoute
#   - HTTP → HTTPS redirect
#   - TLS Certificate (cert-manager)
# =============================================================================

# -- IngressRoute: HTTPS
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: app-ingress
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: k3s-lab
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`app.example.com`)
      kind: Rule
      services:
        - name: app-service
          port: 80
  tls:
    secretName: app-tls

# -- IngressRoute: HTTP → HTTPS redirect
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: app-http-redirect
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: k3s-lab
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`app.example.com`)
      kind: Rule
      middlewares:
        - name: redirect-to-https
      services:
        - name: app-service
          port: 80

# -- Middleware: HTTP → HTTPS redirect
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: k3s-lab
spec:
  redirectScheme:
    scheme: https
    permanent: true

# -- Certificate (cert-manager)
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: app-tls
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: k3s-lab
spec:
  secretName: app-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - app.example.com
