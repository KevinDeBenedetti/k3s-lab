# =============================================================================
# Generic ExternalSecret template
# Consumed via Kustomize overlay — patch metadata.name, namespace, and data keys.
#
# Usage in your overlay kustomization.yaml:
#   resources:
#     - github.com/KevinDeBenedetti/k3s-lab/kubernetes/components/external-secret?ref=v1.0.0
#   patches:
#     - target:
#         kind: ExternalSecret
#         name: app-secret
#       patch: |
#         - op: replace
#           path: /metadata/name
#           value: my-app-secret
#         - op: replace
#           path: /spec/data/0/remoteRef/key
#           value: secret/data/my-app
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secret
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/part-of: k3s-lab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: app-secret
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: secret/data/app
        property: SECRET_KEY
