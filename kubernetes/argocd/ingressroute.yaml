# =============================================================================
# ArgoCD — Traefik IngressRoute + TLS Certificate
#
# Two route types required (ArgoCD docs):
#   - HTTP traffic  → argocd-server:80
#   - gRPC traffic  → argocd-server:80 with h2c scheme (plain HTTP/2)
#
# The gRPC route has higher priority and is matched by Content-Type header.
# This allows the argocd CLI and GitHub webhooks to work on the same domain.
#
# VPN: UI and gRPC routes are restricted to the WireGuard subnet (vpn-only
# middleware). The webhook path stays public so GitHub can reach it.
#
# Auth: ArgoCD handles authentication natively (local admin or OIDC).
# Do NOT add external ForwardAuth here — it conflicts with OIDC callbacks.
#
# Usage: envsubst < ingressroute.yaml | kubectl apply -f -
# Required env: ARGOCD_DOMAIN
# =============================================================================

# ── VPN-only Middleware (WireGuard subnet) ────────────────────────────────────
# Applied to UI + gRPC routes. See middleware-vpn-only.yaml for the source.

# ── IngressRoute ──────────────────────────────────────────────────────────────
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    # GitHub webhook — MUST stay public (GitHub sends from public IPs, not VPN)
    - kind: Rule
      match: Host(`${ARGOCD_DOMAIN}`) && Path(`/api/webhook`)
      priority: 12
      services:
        - name: argocd-server
          port: 80
    # gRPC traffic (argocd CLI) — VPN only
    - kind: Rule
      match: Host(`${ARGOCD_DOMAIN}`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      middlewares:
        - name: vpn-only
      services:
        - name: argocd-server
          port: 80
          scheme: h2c
    # Standard UI — VPN only
    - kind: Rule
      match: Host(`${ARGOCD_DOMAIN}`)
      priority: 10
      middlewares:
        - name: vpn-only
      services:
        - name: argocd-server
          port: 80
  tls:
    secretName: argocd-tls

# ── TLS Certificate (cert-manager → Let's Encrypt) ───────────────────────────
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: argocd
spec:
  secretName: argocd-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - ${ARGOCD_DOMAIN}
