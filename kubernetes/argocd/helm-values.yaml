# =============================================================================
# ArgoCD Helm Values — generic baseline
# Chart: argo/argo-cd
# Docs:  https://argo-cd.readthedocs.io/en/stable/operator-manual/ingress/#traefik-v30
#
# TLS is terminated by Traefik — ArgoCD runs in insecure mode.
# gRPC (CLI/API) and HTTP (UI) share the same domain via Traefik header routing.
#
# OIDC: disabled by default. To enable, uncomment the oidc.config block and
# populate configs.rbac. Most users manage this in their own helm-values.yaml
# overlay (see docs/using-with-infra.md).
# =============================================================================

global:
  domain: argocd.example.com   # overridden at deploy time via --set global.domain=$(ARGOCD_DOMAIN)

# ─── Server ───────────────────────────────────────────────────────────────────
configs:
  params:
    # Traefik handles TLS — ArgoCD must NOT re-terminate it
    server.insecure: "true"

  cm:
    # ArgoCD base URL — overridden at deploy time via --set configs.cm.url=https://$(ARGOCD_DOMAIN)
    url: https://argocd.example.com

    # ── OIDC (optional) ───────────────────────────────────────────────────────
    # Uncomment and fill in your provider's values, or manage via a Vault
    # ExternalSecret that patches argocd-secret with clientID + clientSecret.
    #
    # oidc.config: |
    #   name: MyProvider
    #   issuer: https://auth.example.com
    #   clientID: $oidc.provider.clientID
    #   clientSecret: $oidc.provider.clientSecret
    #   enablePKCEAuthentication: true
    #   requestedScopes:
    #     - openid
    #     - email
    #     - profile

  # ── RBAC ──────────────────────────────────────────────────────────────────
  # Uncomment and restrict once OIDC is configured.
  #
  # rbac:
  #   policy.default: role:''
  #   policy.csv: |
  #     g, you@example.com, role:admin
  #   scopes: '[email]'

server:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ─── Repo server (clones Git repos, renders manifests) ───────────────────────
repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ─── Application controller ───────────────────────────────────────────────────
controller:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi

# ─── ApplicationSet controller ───────────────────────────────────────────────
applicationSet:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ─── Redis (ArgoCD cache) ─────────────────────────────────────────────────────
redis:
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ─── Notifications ───────────────────────────────────────────────────────────
notifications:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ─── Dex (SSO) — disabled, using direct OIDC instead ────────────────────────
dex:
  enabled: false
