# =============================================================================
# Traefik Helm Chart — Production Values
# Chart:   https://helm.traefik.io/traefik
# Version: 39.0.7 (Traefik v3.6.12)
#
# Key design decisions:
#   • hostPort 80/443 — binds host ports directly via CNI, no kube-proxy SNAT.
#     This preserves real client IPs so ipAllowList (vpn-only) middleware works.
#   • NO hostNetwork — container has its own network namespace; uses ClusterFirst
#     DNS so it can resolve internal services (e.g. vault.vault.svc.cluster.local).
#   • NO externalIPs on service — externalIPs use kube-proxy DNAT+MASQUERADE which
#     intercepts traffic before hostPort CNI rules and hides the real client IP.
# =============================================================================

# --- Replica count (1 agent node, scale if more)
deployment:
  replicas: 1

# --- Manage dashboard via IngressRoute, not built-in
ingressRoute:
  dashboard:
    enabled: false

# --- Ports / EntryPoints
# Container listens on non-privileged ports (8000/8443).
# hostPort maps host 80/443 → container 8000/8443 WITHOUT kube-proxy SNAT,
# so Traefik sees the real client IP and ipAllowList/VPN middleware works.
ports:
  web:
    port: 8000
    hostPort: 80
    expose:
      default: true
    exposedPort: 80
    # NOTE: Global HTTP→HTTPS redirect is intentionally NOT configured here.
    # A global redirect on the 'web' entrypoint intercepts cert-manager's
    # HTTP-01 ACME challenge before the solver can respond, breaking TLS issuance.
    # Use a per-route 'redirectScheme' middleware on each IngressRoute instead.
  websecure:
    port: 8443
    hostPort: 443
    expose:
      default: true
    exposedPort: 443
  # Avoid port collision with k3s (8080) and node-exporter (9100)
  traefik:
    port: 9000
    expose:
      default: false
  metrics:
    port: 9101
    expose:
      default: false
    exposedPort: 9101

# --- Service
# hostPort handles external traffic directly — service is only for cluster-internal
# routing (ClusterIP). LoadBalancer/externalIPs are NOT needed and must NOT be used
# (they cause kube-proxy to SNAT client IPs before they reach Traefik).
service:
  type: ClusterIP

# --- TLS hardening: drop TLS 1.0/1.1, restrict cipher suites
tlsOptions:
  default:
    minVersion: VersionTLS12
    cipherSuites:
      - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      - TLS_AES_128_GCM_SHA256
      - TLS_AES_256_GCM_SHA384
      - TLS_CHACHA20_POLY1305_SHA256
    sniStrict: true

# --- Logs
logs:
  general:
    level: WARN
  access:
    enabled: true
    format: json
    fields:
      defaultMode: keep
      headers:
        defaultMode: drop

# --- Prometheus metrics
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    # ServiceMonitor: enabled by deploy-monitoring.sh once kube-prometheus-stack CRDs exist
    disableAPICheck: true
    serviceMonitor:
      enabled: false
      namespace: ingress
      jobLabel: traefik
      interval: 30s

# --- Resources
resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# --- Security context (run as non-root)
podSecurityContext:
  fsGroup: 65532

securityContext:
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  readOnlyRootFilesystem: true
  runAsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532

# --- Persistent storage (not needed when cert-manager issues certs)
persistence:
  enabled: false

# --- Additional args
additionalArguments:
  - "--api.insecure=false"
  - "--providers.kubernetesingress.allowemptyservices=true"
  - "--providers.kubernetescrd.allowcrossnamespace=true"
  - "--global.checknewversion=false"
  - "--global.sendanonymoususage=false"
