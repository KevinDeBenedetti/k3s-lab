# =============================================================================
# Traefik Helm Chart — Production Values
# Repo:    https://helm.traefik.io/traefik
# Install: helm upgrade --install traefik traefik/traefik -n ingress -f traefik-values.yaml
# =============================================================================

# --- Replica count (1 worker node, scale if more)
deployment:
  replicas: 1

# --- Manage dashboard via IngressRoute, not built-in
ingressRoute:
  dashboard:
    enabled: false

# --- Ports / EntryPoints
ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
    # NOTE: Global HTTP→HTTPS redirect is intentionally NOT configured here.
    # A global redirect on the 'web' entrypoint intercepts cert-manager's
    # HTTP-01 ACME challenge before the solver can respond, breaking TLS issuance.
    # Use a per-route 'redirectScheme' middleware on each IngressRoute instead.
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    tls:
      enabled: true
  metrics:
    port: 9100
    expose:
      default: false
    exposedPort: 9100

# --- Service (external load-balancer on the single worker)
service:
  type: LoadBalancer
  spec:
    # Optional: if your VPS has a fixed public IP, pin it here
    # loadBalancerIP: "5.6.7.8"

# --- TLS hardening: drop TLS 1.0/1.1, restrict cipher suites
tlsOptions:
  default:
    minVersion: VersionTLS12
    cipherSuites:
      - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
      - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      - TLS_AES_128_GCM_SHA256
      - TLS_AES_256_GCM_SHA384
      - TLS_CHACHA20_POLY1305_SHA256
    sniStrict: true

# --- Logs
logs:
  general:
    level: WARN
  access:
    enabled: true
    format: json
    fields:
      defaultMode: keep
      headers:
        defaultMode: drop

# --- Prometheus metrics
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    # ServiceMonitor: auto-discovered by kube-prometheus-stack's Prometheus Operator
    serviceMonitor:
      enabled: true
      namespace: ingress
      jobLabel: traefik
      interval: 30s

# --- Resources
resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# --- Security context (run as non-root)
podSecurityContext:
  fsGroup: 65532

securityContext:
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  readOnlyRootFilesystem: true
  runAsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532

# --- Persistent storage (not needed when cert-manager issues certs)
persistence:
  enabled: false

# --- Additional args
additionalArguments:
  - "--api.insecure=false"
  - "--providers.kubernetesingress.allowemptyservices=true"
  - "--global.checknewversion=false"
  - "--global.sendanonymoususage=false"
