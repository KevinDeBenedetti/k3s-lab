# =============================================================================
# Traefik Dashboard — secured via BasicAuth + HTTPS
# Prerequisites:
#   1. Create the BasicAuth secret (run once on your local machine):
#      kubectl create secret generic traefik-dashboard-auth \
#        --from-literal=users="$(htpasswd -nb admin <YOUR_PASSWORD>)" \
#        -n ingress
#   2. Set DASHBOARD_DOMAIN in your .env and replace below.
# =============================================================================

# -- Middleware: strip the /dashboard prefix handled by Traefik internally
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-basicauth
  namespace: ingress
spec:
  basicAuth:
    secret: traefik-dashboard-auth
    removeHeader: true

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: dashboard-redirect-scheme
  namespace: ingress
spec:
  redirectScheme:
    scheme: https
    permanent: true

# -- IngressRoute: expose dashboard on dashboard.<DOMAIN>
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: ingress
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`${DASHBOARD_DOMAIN}`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      middlewares:
        - name: dashboard-basicauth
          namespace: ingress
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: traefik-dashboard-tls

# -- Certificate for the dashboard domain
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: traefik-dashboard-tls
  namespace: ingress
spec:
  secretName: traefik-dashboard-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - ${DASHBOARD_DOMAIN}
